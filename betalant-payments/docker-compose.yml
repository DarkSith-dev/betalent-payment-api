version: '3.9'

services:

  mysql:
    image: mysql:8
    container_name: betalant_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: betalant
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql


  api:
    build: .
    container_name: betalant_api
    restart: always
    ports:
      - "3333:3333"
    depends_on:
      - mysql
      - gateways
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_DATABASE: betalant


  gateways:
    image: matheusprotzen/gateways-mock
    container_name: betalant_gateways
    ports:
      - "3001:3001"
      - "3002:3002"


volumes:
  mysql_data: